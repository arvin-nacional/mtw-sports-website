<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="50%" style="stop-color:#1a4a7a"/>
      <stop offset="100%" style="stop-color:#0f2d4a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#5bb8fe;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#5bb8fe;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="90%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#2e5c8a;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#2e5c8a;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="50%" style="stop-color:#5bb8fe"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.03"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Accent line -->
  <rect x="100" y="200" width="80" height="4" rx="2" fill="url(#accentGradient)"/>
  
  <!-- Eyebrow -->
  <text x="100" y="180" fill="#5bb8fe" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="0.3em">OUR SOLUTIONS</text>
  
  <!-- Main Title -->
  <text x="100" y="280" fill="white" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800">Sports Technology</text>
  <text x="100" y="350" fill="white" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="800">Ecosystem</text>
  
  <!-- Subtitle -->
  <text x="100" y="410" fill="rgba(255,255,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400">Video • Analytics • Streaming • Scoring • Assessment</text>
  
  <!-- Bottom accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accentGradient)"/>
  
  <!-- Domain -->
  <text x="100" y="560" fill="rgba(255,255,255,0.5)" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">mtwsports.com/solutions</text>
</svg>
